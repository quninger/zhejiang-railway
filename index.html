<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>浙江省高铁路线 - 大屏展示</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  @keyframes titleGlow {
    0%, 100% { text-shadow: 0 0 10px rgba(255,255,255,0.4), 0 0 20px rgba(74,144,226,0.4), 0 0 40px rgba(74,144,226,0.2); }
    50% { text-shadow: 0 0 20px rgba(255,255,255,0.7), 0 0 40px rgba(74,144,226,0.7), 0 0 80px rgba(74,144,226,0.4); }
  }
  @keyframes float { 0%,100%{transform:translateY(0)} 50%{transform:translateY(-6px)} }
  @keyframes borderPulse {
    0%,100%{border-color:rgba(74,144,226,0.3);box-shadow:0 0 10px rgba(74,144,226,0.1) inset}
    50%{border-color:rgba(74,144,226,0.8);box-shadow:0 0 20px rgba(74,144,226,0.2) inset}
  }
  @keyframes glowPulse { 0%,100%{opacity:0.6} 50%{opacity:1} }
  body {
    width:100vw;height:100vh;overflow:hidden;
    background:radial-gradient(ellipse at center,#0a1628 0%,#060e1b 50%,#020810 100%);
    font-family:'Microsoft YaHei','PingFang SC',sans-serif;color:#fff;
    display:flex;flex-direction:column;align-items:center;
  }
  .header {
    position:relative;width:100%;height:100px;
    display:flex;align-items:center;justify-content:center;flex-shrink:0;z-index:10;
  }
  .title-wrapper { position:relative;display:flex;align-items:center;gap:30px; }
  .title-line {
    width:200px;height:2px;
    background:linear-gradient(90deg,transparent,rgba(74,144,226,0.8),transparent);
    animation:borderPulse 2s ease-in-out infinite;
  }
  .title {
    font-size:42px;font-weight:700;letter-spacing:8px;
    background:linear-gradient(180deg,#ffffff 0%,#a0c4e8 100%);
    -webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;
    animation:titleGlow 3s ease-in-out infinite;white-space:nowrap;
  }
  .particles { position:absolute;top:0;left:0;width:100%;height:100px;pointer-events:none; }
  .particle {
    position:absolute;width:4px;height:4px;background:rgba(74,144,226,0.6);border-radius:50%;
    animation:float 3s ease-in-out infinite;
  }
  .map-container { flex:1;width:100%;position:relative;padding:0 40px 20px 40px; }
  #mapChart { width:100%;height:100%; }

  /* ---- 右下角图例 ---- */
  .legend {
    position:absolute;bottom:40px;right:40px;display:flex;flex-direction:column;gap:8px;
    padding:10px 16px;background:rgba(10,22,40,0.85);border:1px solid rgba(74,144,226,0.3);
    border-radius:8px;z-index:10;backdrop-filter:blur(10px);
  }
  .legend-item { display:flex;align-items:center;gap:8px;font-size:12px;color:#a0c4e8; }
  .legend-line { width:40px;height:3px;border-radius:2px; }
  .legend-dot { width:12px;height:12px;border-radius:50%;animation:float 1.5s ease-in-out infinite; }

  /* ---- 右上角数据卡片 ---- */
  .info-cards {
    position:absolute;top:20px;right:60px;display:flex;gap:20px;z-index:10;
  }
  .info-card {
    background:rgba(10,22,40,0.8);border:1px solid rgba(74,144,226,0.25);
    border-radius:6px;padding:12px 20px;text-align:center;backdrop-filter:blur(10px);
  }
  .info-card .value { font-size:28px;font-weight:700;color:#4a90e2;font-family:'DIN','Consolas',monospace; }
  .info-card .label { font-size:12px;color:#6b8db5;margin-top:4px; }

  /* ---- 左下角路线查询面板 ---- */
  .route-panel {
    position:absolute;bottom:30px;left:30px;display:flex;flex-direction:column;gap:5px;
    padding:10px 14px;background:rgba(10,22,40,0.88);border:1px solid rgba(74,144,226,0.35);
    border-radius:8px;z-index:10;backdrop-filter:blur(10px);min-width:210px;
  }
  .route-panel .panel-title { font-size:11px;color:#6b8db5;text-align:center;letter-spacing:1px; }
  .route-panel .row { display:flex;align-items:center;gap:6px; }
  .route-panel .row label { font-size:11px;color:#a0c4e8;white-space:nowrap;min-width:24px; }
  .route-panel select {
    flex:1;padding:4px 8px;font-size:11px;background:rgba(20,40,70,0.9);color:#d0e4f7;
    border:1px solid rgba(74,144,226,0.4);border-radius:4px;outline:none;cursor:pointer;
    font-family:inherit;max-width:140px;
  }
  .route-panel select:focus { border-color:#4a90e2;box-shadow:0 0 8px rgba(74,144,226,0.3); }
  .route-panel select option { background:#0a1a30;color:#d0e4f7; }
  .route-panel .btn-row { display:flex;gap:5px;justify-content:center; }
  .route-panel button {
    padding:4px 10px;font-size:11px;font-family:inherit;border-radius:4px;
    border:1px solid rgba(74,144,226,0.4);cursor:pointer;transition:all 0.2s;
  }
  .btn-search { background:rgba(74,144,226,0.25);color:#d0e4f7; }
  .btn-search:hover { background:rgba(74,144,226,0.45);border-color:#4a90e2;box-shadow:0 0 12px rgba(74,144,226,0.3); }
  .btn-reset { background:rgba(255,255,255,0.08);color:#8899aa; }
  .btn-reset:hover { background:rgba(255,255,255,0.15);border-color:rgba(255,255,255,0.3); }

  /* 路线结果悬窗 */
  .path-info {
    display:none;position:absolute;top:520px;right:60px;width:175px;max-height:220px;
    padding:10px 12px;background:rgba(10,22,40,0.92);border:1px solid rgba(255,255,255,0.4);
    border-radius:8px;z-index:10;color:#fff;font-size:11px;
    animation:glowPulse 2s ease-in-out infinite;backdrop-filter:blur(10px);
    overflow-y:auto;flex-direction:column;gap:3px;
  }
  .path-info::-webkit-scrollbar { width:4px; }
  .path-info::-webkit-scrollbar-thumb { background:rgba(255,255,255,0.2);border-radius:2px; }
  .path-info.show { display:flex; }
  .path-info .pi-title { font-size:11px;color:#fff;text-align:center;padding-bottom:6px;border-bottom:1px solid rgba(255,255,255,0.15);margin-bottom:2px; }
  .path-info .pi-station { padding:2px 6px;color:#a0c4e8;border-radius:3px; }
  .path-info .pi-station.start { color:#fff;font-weight:bold; }
  .path-info .pi-station.end { color:#fff;font-weight:bold; }
  .path-info .pi-arrow { text-align:center;color:rgba(255,255,255,0.3);font-size:10px;line-height:1; }
  .path-info .pi-route { font-size:10px;color:#6b8db5;text-align:center;padding:2px 0; }
  .station-tooltip {
    padding:8px 14px!important;background:rgba(10,22,40,0.92)!important;
    border:1px solid rgba(74,144,226,0.5)!important;border-radius:6px!important;
    color:#fff!important;font-size:14px!important;white-space:nowrap!important;
    box-shadow:0 4px 20px rgba(0,0,0,0.5)!important;
  }
</style>
</head>
<body>
<div class="header">
  <div class="particles" id="particles"></div>
  <div class="title-wrapper">
    <div class="title-line"></div>
    <h1 class="title">浙 江 省 高 铁 路 线</h1>
    <div class="title-line"></div>
  </div>
</div>
<div class="map-container">
  <div id="mapChart"></div>
  <div class="info-cards">
    <div class="info-card"><div class="value" id="routeCount">9</div><div class="label">高铁路线</div></div>
    <div class="info-card"><div class="value" id="stationCount">0</div><div class="label">高铁站点</div></div>
    <div class="info-card"><div class="value" id="cityCount">11</div><div class="label">覆盖地市</div></div>
  </div>

  <!-- 路线查询面板 -->
  <div class="route-panel" id="routePanel">
    <div class="panel-title">🔍 两站之间路线查询</div>
    <div class="row"><label>起点</label><select id="selFrom"><option value="">-- 选择站点 --</option></select></div>
    <div class="row"><label>终点</label><select id="selTo"><option value="">-- 选择站点 --</option></select></div>
    <div class="btn-row">
      <button class="btn-search" id="btnSearch">查询路线</button>
      <button class="btn-reset" id="btnReset">🔄 重置地图</button>
    </div>
  </div>
  <div class="path-info" id="pathInfo"></div>
  <div class="legend">
    <div class="legend-item"><div class="legend-line" style="background:#4a90e2;"></div><span>已开通</span></div>
    <div class="legend-item"><div class="legend-line" style="background:transparent;border:1px dashed #e8a040;height:0;width:38px;"></div><span>建设中</span></div>
    <div class="legend-item"><div class="legend-dot" style="background:#fff;box-shadow:0 0 10px #fff;"></div><span>主要站点</span></div>
    <div class="legend-item"><div class="legend-line" style="background:#fff;box-shadow:0 0 10px rgba(255,255,255,0.8);"></div><span>查询结果</span></div>
  </div>
</div>

<script src="js/echarts.min.js"></script>
<script>
(function() {
  // 粒子
  const pc = document.getElementById('particles');
  for(let i=0;i<20;i++){const p=document.createElement('div');p.className='particle';p.style.left=Math.random()*100+'%';p.style.top=Math.random()*100+'%';p.style.animationDelay=Math.random()*3+'s';p.style.animationDuration=(2+Math.random()*4)+'s';pc.appendChild(p);}

  // 站点
  const stations={
    '嘉善南':[121.00,30.77],'嘉兴南':[120.76,30.75],'桐乡':[120.43,30.50],'杭州东':[120.21,30.28],
    '杭州南':[120.28,30.15],'杭州西':[120.00,30.30],'诸暨':[120.25,30.10],'义乌':[120.07,29.53],
    '金华':[119.65,29.08],'龙游':[119.18,29.03],'衢州':[118.87,28.97],'江山':[118.62,28.74],
    '绍兴北':[120.58,30.03],'余姚北':[120.98,30.07],'庄桥':[121.30,29.93],'宁波':[121.54,29.86],
    '奉化':[121.41,29.65],'宁海':[121.43,29.37],'三门县':[121.40,29.18],'临海':[121.13,28.85],
    '台州':[121.42,28.65],'温岭':[121.17,28.46],'雁荡山':[121.02,28.20],'乐清':[120.94,28.12],
    '温州南':[120.70,28.00],'富阳':[119.96,30.05],'桐庐':[119.69,29.79],'桐庐东':[119.65,29.78],
    '建德':[119.37,29.62],'千岛湖':[119.04,29.60],'浦江':[119.88,29.45],'横店':[120.30,29.15],
    '磐安':[120.45,28.93],'仙居':[120.72,28.60],'楠溪江':[120.40,28.15],'湖州':[120.09,30.89],
    '德清':[120.00,30.52],'嵊州新昌':[120.83,29.60],'天台山':[121.03,29.13],'温岭西':[121.35,28.37],
    '玉环':[121.34,28.28],'海盐西':[120.85,30.67],'慈溪':[120.95,30.50],'武义北':[119.82,28.88],
    '永康南':[119.92,28.80],'缙云西':[120.07,28.57],'丽水':[119.92,28.45],'青田':[120.30,28.13],
  };

  // 线路
  const routes=[
    {name:'沪昆高铁',stns:['嘉善南','嘉兴南','桐乡','杭州东','诸暨','义乌','金华','龙游','衢州','江山'],status:'open'},
    {name:'杭甬高铁',stns:['杭州东','杭州南','绍兴北','余姚北','庄桥','宁波'],status:'open'},
    {name:'甬台温铁路',stns:['宁波','奉化','宁海','三门县','临海','台州','温岭','雁荡山','乐清','温州南'],status:'open'},
    {name:'杭黄高铁',stns:['杭州南','富阳','桐庐','建德','千岛湖'],status:'open'},
    {name:'杭温高铁',stns:['杭州西','桐庐东','浦江','义乌','横店','磐安','仙居','楠溪江','温州南'],status:'building'},
    {name:'商合杭高铁',stns:['湖州','德清','杭州西'],status:'open'},
    {name:'杭台高铁',stns:['杭州东','绍兴北','嵊州新昌','天台山','临海','台州','温岭西','玉环'],status:'open'},
    {name:'通苏嘉甬高铁',stns:['嘉兴南','海盐西','慈溪','宁波'],status:'building'},
    {name:'金丽温高铁',stns:['金华','武义北','永康南','缙云西','丽水','青田','温州南'],status:'open'},
  ];
  const colors=['#4a90e2','#5b9ee8','#6dacee','#3d7ec5','#2b6cb0','#1a5a9e','#4a90e2','#e8a040','#5b9ee8'];

  const cities=[
    {name:'杭州市',coord:[120.15,30.28]},{name:'宁波市',coord:[121.54,29.86]},{name:'温州市',coord:[120.70,28.00]},
    {name:'嘉兴市',coord:[120.76,30.77]},{name:'湖州市',coord:[120.09,30.89]},{name:'绍兴市',coord:[120.58,30.03]},
    {name:'金华市',coord:[119.65,29.08]},{name:'衢州市',coord:[118.87,28.97]},{name:'舟山市',coord:[122.11,30.02]},
    {name:'台州市',coord:[121.42,28.65]},{name:'丽水市',coord:[119.92,28.45]},
  ];

  // 下拉框
  const sn=Object.keys(stations).sort(),sf=document.getElementById('selFrom'),st=document.getElementById('selTo');
  sn.forEach(n=>{sf.add(new Option(n,n));st.add(new Option(n,n));});

  // 邻接图
  const graph={};sn.forEach(s=>{graph[s]=[];});
  routes.forEach(r=>{for(let i=0;i<r.stns.length-1;i++){const a=r.stns[i],b=r.stns[i+1];graph[a].push({neighbor:b,routeName:r.name});graph[b].push({neighbor:a,routeName:r.name});}});

  function findPath(from,to){
    if(from===to)return{path:[from],segments:[]};
    const visited=new Set([from]),queue=[[from]];
    while(queue.length>0){const path=queue.shift(),cur=path[path.length-1];
      for(const e of graph[cur]){if(e.neighbor===to){const fp=[...path,to],segs=[];
        for(let i=0;i<fp.length-1;i++){const a=fp[i],b=fp[i+1];const m=graph[a].find(x=>x.neighbor===b);segs.push({from:a,to:b,route:m?m.routeName:'?'});}
        return{path:fp,segments:segs};}
      if(!visited.has(e.neighbor)){visited.add(e.neighbor);queue.push([...path,e.neighbor]);}}}
    return null;
  }

  let chart;
  Promise.all([
    fetch('data/china.json').then(r=>r.json()),
    fetch('data/zhejiang.json').then(r=>r.json())
  ]).then(([chinaGeo,zhejiangGeo])=>{
    chart=echarts.init(document.getElementById('mapChart'));
    echarts.registerMap('china',chinaGeo);
    echarts.registerMap('zhejiang',zhejiangGeo);

    const lineSeries=routes.map((route,idx)=>{
      const coords=route.stns.map(s=>stations[s]),segments=[];
      for(let i=0;i<coords.length-1;i++)segments.push({coords:[coords[i],coords[i+1]]});
      const isB=route.status==='building';
      return{
        id:'route_'+idx,name:route.name,type:'lines',coordinateSystem:'geo',polyline:false,data:segments,
        lineStyle:{color:isB?'#e8a040':colors[idx%colors.length],width:1.2,opacity:0.45,type:isB?'dashed':'solid',curveness:0.1},
        emphasis:{lineStyle:{width:3,opacity:1,shadowBlur:10,shadowColor:'rgba(255,255,255,0.6)'}},zlevel:1,
      };
    });

    const stationData=Object.entries(stations).map(([name,coord])=>({name,value:coord}));

    const highlightSeries={
      id:'highlightRoute',type:'lines',coordinateSystem:'geo',polyline:false,data:[],
      lineStyle:{color:'#ffffff',width:3.5,opacity:1,shadowBlur:16,shadowColor:'rgba(255,255,255,0.8)'},
      effect:{show:true,period:1.5,trailLength:0.3,symbol:'circle',symbolSize:5,color:'#ffffff'},zlevel:5,
    };

    const option={
      backgroundColor:'transparent',
      tooltip:{trigger:'item',
        formatter(p){if(p.seriesType==='effectScatter'&&p.name)return'<div class="station-tooltip">🚄 '+p.name+'</div>';if(p.seriesType==='lines'&&p.name)return'<div class="station-tooltip">'+p.name+'</div>';return'';},
        backgroundColor:'rgba(10,22,40,0.92)',borderColor:'rgba(74,144,226,0.5)',borderWidth:1,textStyle:{color:'#fff',fontSize:14},extraCssText:'border-radius:6px;box-shadow:0 4px 20px rgba(0,0,0,0.5);'},
      geo:{map:'zhejiang',roam:true,zoom:1.25,center:[120.5,29.3],scaleLimit:{min:0.6,max:8},
        itemStyle:{borderColor:'rgba(40,60,80,0.3)',borderWidth:0.8,shadowColor:'transparent',shadowBlur:0},
        regions:[
          {name:'杭州市',itemStyle:{areaColor:'rgba(12,35,68,0.92)'}},{name:'宁波市',itemStyle:{areaColor:'rgba(10,30,60,0.9)'}},
          {name:'温州市',itemStyle:{areaColor:'rgba(11,33,64,0.91)'}},{name:'嘉兴市',itemStyle:{areaColor:'rgba(9,28,58,0.89)'}},
          {name:'湖州市',itemStyle:{areaColor:'rgba(13,36,70,0.93)'}},{name:'绍兴市',itemStyle:{areaColor:'rgba(10,31,62,0.9)'}},
          {name:'金华市',itemStyle:{areaColor:'rgba(11,32,65,0.91)'}},{name:'衢州市',itemStyle:{areaColor:'rgba(9,29,59,0.89)'}},
          {name:'舟山市',itemStyle:{areaColor:'rgba(14,37,72,0.94)'}},{name:'台州市',itemStyle:{areaColor:'rgba(10,31,63,0.9)'}},
          {name:'丽水市',itemStyle:{areaColor:'rgba(12,34,67,0.91)'}},
        ],emphasis:{disabled:true},
        label:{show:true,color:'#6a8eb5',fontSize:13,fontWeight:'bold',textShadowColor:'rgba(0,0,0,0.8)',textShadowBlur:4}},
      series:[...lineSeries,highlightSeries,
        {type:'effectScatter',coordinateSystem:'geo',data:stationData,symbolSize:5,showEffectOn:'render',
          rippleEffect:{brushType:'stroke',scale:2,period:3,color:'#ffffff'},
          itemStyle:{color:'rgba(255,255,255,0.6)',shadowBlur:5,shadowColor:'rgba(255,255,255,0.3)'},
          emphasis:{scale:2,itemStyle:{color:'#ffffff',shadowBlur:15,shadowColor:'rgba(255,255,255,0.9)'}},zlevel:2},
        {type:'scatter',coordinateSystem:'geo',data:stationData,symbolSize:3,
          itemStyle:{color:'rgba(255,255,255,0.5)',shadowBlur:3,shadowColor:'rgba(255,255,255,0.2)'},
          emphasis:{scale:2.5,itemStyle:{color:'#ffffff',shadowBlur:10,shadowColor:'rgba(255,255,255,0.8)'}},
          label:{show:false},zlevel:12,silent:true},
      ]
    };
    chart.setOption(option);
    window.addEventListener('resize',()=>chart.resize());
    document.getElementById('stationCount').textContent=Object.keys(stations).length;
    console.log('✅ 就绪 — '+Object.keys(stations).length+' 站点, '+routes.length+' 线路, '+cities.length+' 地市');
  }).catch(err=>{
    console.error('加载地图失败:',err);
    document.getElementById('mapChart').innerHTML='<div style="display:flex;align-items:center;justify-content:center;height:100%;color:#e04040;font-size:18px;">⚠ 无法加载地图数据，请检查网络后刷新页面</div>';
  });

  // 路线查询
  document.getElementById('btnSearch').addEventListener('click',()=>{
    const from=sf.value,to=st.value,pi=document.getElementById('pathInfo');
    if(!from||!to){showPathError('⚠ 请选择起点和终点');return;}
    if(from===to){showPathError('📍 '+from+' — 已在同一站');return;}
    const result=findPath(from,to);
    if(!result){showPathError('❌ '+from+' → '+to+' 无法直达');return;}

    // 构建高亮
    const segs=[];for(let i=0;i<result.path.length-1;i++){const a=result.path[i],b=result.path[i+1];segs.push({coords:[stations[a],stations[b]]});}
    chart.setOption({series:[{id:'highlightRoute',data:segs}]});

    // 填充悬窗内容（可滚动）
    const rn=[...new Set(result.segments.map(s=>s.route))];
    let html='<div class="pi-title">'+from+' → '+to+'</div>';
    html+='<div class="pi-route">途经: '+rn.join('、')+'</div>';
    result.path.forEach((s,i)=>{
      const cls=i===0?'start':(i===result.path.length-1?'end':'');
      html+='<div class="pi-station '+cls+'">'+s+'</div>';
      if(i<result.path.length-1)html+='<div class="pi-arrow">↓</div>';
    });
    pi.innerHTML=html;
    pi.className='path-info show';

    // 缩放
    const ac=result.path.map(s=>stations[s]),lngs=ac.map(c=>c[0]),lats=ac.map(c=>c[1]);
    const range=Math.max(Math.max(...lngs)-Math.min(...lngs),Math.max(...lats)-Math.min(...lats),0.5);
    chart.setOption({geo:{center:[(Math.min(...lngs)+Math.max(...lngs))/2,(Math.min(...lats)+Math.max(...lats))/2],zoom:Math.min(4,2.5/range)}});
  });

  function showPathError(msg){
    const pi=document.getElementById('pathInfo');
    pi.innerHTML='<div class="pi-title" style="color:#ff8060">'+msg+'</div>';
    pi.className='path-info show';
  }

  // 重置
  document.getElementById('btnReset').addEventListener('click',()=>{
    sf.value='';st.value='';
    chart.setOption({series:[{id:'highlightRoute',data:[]}]});
    document.getElementById('pathInfo').className='path-info';
    chart.dispatchAction({type:'restore'});
    chart.setOption({geo:{center:[120.5,29.3],zoom:1.25}});
  });
})();
</script>
